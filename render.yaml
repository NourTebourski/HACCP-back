databases:
  - name: haccp-db
    databaseName: haccp_food
    user: haccp_user
    plan: free

services:
  - type: web
    name: haccp-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: haccp-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false  # set to your Vercel URL in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: THROTTLE_TTL
        value: 60
      - key: THROTTLE_LIMIT
        value: 100
